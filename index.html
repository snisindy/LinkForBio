<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNI sindy - Official Store</title>
    <!-- SEO Settings -->
    <meta name="description" content="ติดต่อร้าน SNI sindy ดูรายละเอียดสินค้า รีวิวจากลูกค้า และช่องทางการติดต่อครบวงจร">
    <meta name="keywords" content="SNI sindy, สินค้าน่ารัก, รีวิวร้าน, ช่องทางติดต่อ, เครดิตร้าน, สั่งซื้อสินค้า">
    <meta name="author" content="SNI sindy">
    <!-- Favicon เปลี่ยนโลโก้ใหม่ -->
    <link rel="icon" href="https://s.imgz.io/2026/07/15/DA0D2171-669F-4863-B0AD-A3084C2E881A787a7e4aae484696.png" type="image/png">
    
    <!-- Google Fonts: Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; }
        
        /* สไตล์สำหรับเมนู Tabs */
        .tab-active { 
            background-color: #ec4899; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.2);
        }
        .tab-inactive { 
            color: #6b7280; 
            background-color: transparent;
        }
        .tab-inactive:hover { 
            background-color: #fce7f3; 
            color: #db2777;
        }
        
        /* ซ่อน Scrollbar ของเมนูในมือถือ */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* การตั้งค่าหน้าจอโหลด */
        #loader { display: flex; }
        #app-content { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-50 via-white to-pink-100 min-h-screen flex flex-col text-gray-800 antialiased selection:bg-pink-300 selection:text-white">

    <!-- หน้าจอโหลดข้อมูลแบบมินิมอล -->
    <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm items-center justify-center z-50 flex-col">
        <div class="w-16 h-16 border-4 border-pink-100 border-t-pink-500 rounded-full animate-spin"></div>
        <p class="mt-6 text-pink-500 font-medium tracking-wide">กำลังเตรียมข้อมูล...</p>
    </div>

    <!-- แถบนำทาง (Navbar) -->
    <header class="sticky top-4 z-40 mx-4 max-w-4xl md:mx-auto bg-white/85 backdrop-blur-md shadow-sm border border-pink-100 rounded-full py-2 px-4 mb-8 transition-all">
        <div class="flex justify-between items-center mb-2 px-2 pt-1">
            <div class="flex items-center gap-3">
                <!-- เปลี่ยนโลโก้ใหม่ -->
                <img src="https://s.imgz.io/2026/07/15/DA0D2171-669F-4863-B0AD-A3084C2E881A787a7e4aae484696.png" alt="SNI sindy Logo" class="w-9 h-9 rounded-full shadow-sm border border-pink-50 object-cover">
                <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-pink-400">SNI sindy</h1>
            </div>
            <button onclick="checkAdminAccess()" class="text-xs bg-gray-50 text-gray-400 px-3 py-1.5 rounded-full hover:bg-pink-100 hover:text-pink-600 transition-colors border border-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 inline-block mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>ระบบจัดการ
            </button>
        </div>
        
        <nav class="flex space-x-2 overflow-x-auto hide-scrollbar pb-1 px-1" id="nav-tabs">
            <button onclick="switchTab('contact')" id="tab-contact" class="px-5 py-1.5 rounded-full text-sm font-medium transition-all duration-300 tab-active whitespace-nowrap">ช่องทางติดต่อ</button>
            <button onclick="switchTab('products')" id="tab-products" class="px-5 py-1.5 rounded-full text-sm font-medium transition-all duration-300 tab-inactive whitespace-nowrap">ตัวอย่างสินค้า</button>
            <button onclick="switchTab('reviews')" id="tab-reviews" class="px-5 py-1.5 rounded-full text-sm font-medium transition-all duration-300 tab-inactive whitespace-nowrap">เครดิตและรีวิว</button>
            <button onclick="switchTab('admin')" id="tab-admin" class="px-5 py-1.5 rounded-full text-sm font-medium transition-all duration-300 tab-inactive whitespace-nowrap hidden">หลังบ้าน</button>
        </nav>
    </header>

    <!-- เนื้อหาหลัก -->
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 pb-12" id="app-content">
        
        <!-- ส่วนที่ 1: ช่องทางการติดต่อ -->
        <section id="view-contact" class="space-y-8 animate-fade-in">
            <div class="bg-white/60 backdrop-blur-sm p-8 rounded-3xl shadow-sm text-center border border-pink-100/50">
                <div class="relative w-28 h-28 mx-auto mb-6">
                    <div class="absolute inset-0 bg-pink-200 rounded-full blur-md opacity-50 animate-pulse"></div>
                    <!-- เปลี่ยนโลโก้ใหม่ -->
                    <img src="https://s.imgz.io/2026/07/15/DA0D2171-669F-4863-B0AD-A3084C2E881A787a7e4aae484696.png" alt="Logo" class="relative w-28 h-28 rounded-full shadow-lg border-4 border-white object-cover">
                </div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2">SNI sindy</h2>
                <p class="text-pink-500 font-medium mb-8">ยินดีต้อนรับสู่ศูนย์รวมสินค้าน่ารักของเรา</p>
                
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 text-left px-2">ช่องทางการติดต่อ</h3>
                <div id="platforms-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                    <!-- ข้อมูลแพลตฟอร์ม -->
                </div>

                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4 text-left px-2">เว็บไซต์ที่เกี่ยวข้อง</h3>
                <div id="websites-container" class="flex flex-col gap-3">
                    <!-- ข้อมูลเว็บไซต์ -->
                </div>
            </div>
        </section>

        <!-- ส่วนที่ 2: ตัวอย่างสินค้า -->
        <section id="view-products" class="hidden space-y-6">
            <div class="flex items-center gap-3 px-2">
                <div class="w-1.5 h-6 bg-pink-500 rounded-full"></div>
                <h2 class="text-2xl font-bold text-gray-800">สินค้าของเรา</h2>
            </div>
            <div id="products-container" class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <!-- ข้อมูลสินค้า -->
            </div>
        </section>

        <!-- ส่วนที่ 3: เครดิตและรีวิว -->
        <section id="view-reviews" class="hidden space-y-6">
            <div class="flex items-center gap-3 px-2">
                <div class="w-1.5 h-6 bg-pink-500 rounded-full"></div>
                <h2 class="text-2xl font-bold text-gray-800">เครดิตและรีวิว</h2>
            </div>
            <div id="reviews-container" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- ข้อมูลรีวิว -->
            </div>
        </section>

        <!-- ส่วนที่ 4: ระบบหลังบ้าน (Admin) -->
        <section id="view-admin" class="hidden space-y-6">
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-pink-100">
                <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="p-2 bg-pink-100 text-pink-600 rounded-xl">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800">ระบบจัดการฐานข้อมูล</h2>
                    </div>
                    <button onclick="switchTab('contact')" class="text-sm bg-gray-50 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-full transition-colors font-medium">ออกจากระบบ</button>
                </div>
                
                <div class="flex flex-wrap gap-3 mb-8" id="admin-menus">
                    <button onclick="renderAdminTable('Platforms')" class="admin-menu bg-pink-500 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-md shadow-pink-200 transition-all">จัดการแพลตฟอร์ม</button>
                    <button onclick="renderAdminTable('Websites')" class="admin-menu bg-pink-50 hover:bg-pink-100 text-pink-600 px-5 py-2.5 rounded-full text-sm font-medium transition-all">จัดการเว็บไซต์</button>
                    <button onclick="renderAdminTable('Products')" class="admin-menu bg-pink-50 hover:bg-pink-100 text-pink-600 px-5 py-2.5 rounded-full text-sm font-medium transition-all">จัดการสินค้า</button>
                    <button onclick="renderAdminTable('Reviews')" class="admin-menu bg-pink-50 hover:bg-pink-100 text-pink-600 px-5 py-2.5 rounded-full text-sm font-medium transition-all">จัดการรีวิว</button>
                </div>

                <div id="admin-workspace" class="bg-gray-50/50 rounded-2xl p-4 md:p-6 border border-gray-100">
                    <p class="text-center text-gray-400 py-12">กรุณาเลือกเมนูด้านบนเพื่อจัดการข้อมูล</p>
                </div>
            </div>
        </section>
    </main>

    <!-- ฟุตเตอร์ -->
    <footer class="mt-auto py-8 text-center">
        <p class="text-sm text-gray-400 font-medium">&copy; 2026 SNI sindy Official Store.</p>
    </footer>

    <!-- CSS Animation เพิ่มเติม -->
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>

    <!-- JavaScript หลัก -->
    <script>
        // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyiM4EgycOym9rnQbG2XvCibU-rntfbLg6jeqX1AcEw3IeN6xXdjOHPW897y_hW9c2hvw/exec'; 
        // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

        let storeData = { Platforms: [], Websites: [], Products: [], Reviews: [] };
        let isAdminAuthed = false;
        
        // อัปเดต Schema ของ Reviews ให้มีช่อง Image เพิ่มขึ้นมา
        const formSchemas = {
            Platforms: [{ key: 'Name', label: 'ชื่อแพลตฟอร์ม' }, { key: 'URL', label: 'ลิงก์ URL (ขึ้นต้นด้วย https://)' }],
            Websites: [{ key: 'Name', label: 'ชื่อเว็บไซต์' }, { key: 'URL', label: 'ลิงก์ URL (ขึ้นต้นด้วย https://)' }],
            Products: [{ key: 'Name', label: 'ชื่อสินค้า' }, { key: 'Price', label: 'ราคา (บาท)' }, { key: 'Image', label: 'URL รูปภาพ' }],
            Reviews: [
                { key: 'Customer', label: 'ชื่อลูกค้า' }, 
                { key: 'Rating', label: 'คะแนน (1-5)' },
                { key: 'Comment', label: 'ข้อความรีวิว' }, 
                { key: 'Image', label: 'URL รูปภาพเครดิต (เว้นว่างได้ถ้าไม่มีรูป)' }
            ]
        };

        window.onload = async () => { await fetchStoreData(); };

        async function fetchStoreData() {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST', redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'getData' })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    storeData = result.data;
                    renderAllViews();
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('app-content').style.display = 'block';
                    }, 500);
                } else {
                    alert('เกิดข้อผิดพลาดในการโหลดข้อมูล: ' + result.message);
                }
            } catch (error) {
                alert('ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบ URL ของ Web App');
            }
        }

        async function saveData(type, dataObj) {
            showLoading(true, 'กำลังบันทึกข้อมูล...');
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST', redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'saveData', type: type, data: dataObj })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    await fetchStoreData(); 
                    renderAdminTable(type); 
                }
            } catch (error) { alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล'); }
            showLoading(false);
        }

        async function deleteData(type, id) {
            if (!confirm('คุณต้องการลบข้อมูลนี้ใช่หรือไม่?')) return;
            showLoading(true, 'กำลังลบข้อมูล...');
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST', redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'deleteData', type: type, id: id })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    await fetchStoreData();
                    renderAdminTable(type);
                }
            } catch (error) { alert('เกิดข้อผิดพลาดในการลบข้อมูล'); }
            showLoading(false);
        }

        // --- ส่วนการจัดการแสดงผล (Render) ---
        function renderAllViews() {
            renderPlatforms(); renderWebsites(); renderProducts(); renderReviews();
        }

        function renderPlatforms() {
            const container = document.getElementById('platforms-container');
            container.innerHTML = '';
            storeData.Platforms.forEach(item => {
                const btn = document.createElement('a');
                btn.href = item.URL;
                btn.target = '_blank';
                btn.className = 'flex items-center gap-4 bg-white hover:bg-pink-500 hover:text-white text-gray-700 p-4 rounded-2xl shadow-sm hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 border border-pink-50 group';
                btn.innerHTML = `
                    <div class="bg-pink-50 group-hover:bg-white/20 p-2.5 rounded-full transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-pink-500 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                    </div>
                    <span class="font-medium text-lg">${item.Name}</span>
                `;
                container.appendChild(btn);
            });
        }

        function renderWebsites() {
            const container = document.getElementById('websites-container');
            container.innerHTML = '';
            storeData.Websites.forEach(item => {
                const link = document.createElement('a');
                link.href = item.URL;
                link.target = '_blank';
                link.className = 'flex items-center justify-between bg-white p-4 rounded-2xl border border-gray-100 hover:border-pink-300 hover:bg-pink-50 transition-all duration-300 text-gray-600 hover:text-pink-600 shadow-sm';
                link.innerHTML = `
                    <div class="flex items-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                        <span class="font-medium">${item.Name}</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                `;
                container.appendChild(link);
            });
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            if (storeData.Products.length === 0) {
                container.innerHTML = '<div class="col-span-full py-12 text-center text-gray-400 bg-white rounded-3xl border border-dashed border-gray-200">ยังไม่มีข้อมูลสินค้า</div>';
                return;
            }
            storeData.Products.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 border border-pink-50 overflow-hidden group flex flex-col';
                card.innerHTML = `
                    <div class="overflow-hidden bg-gray-50 aspect-[4/3] relative">
                        <!-- เปลี่ยนโลโก้สำรองเมื่อรูปโหลดไม่ขึ้น -->
                        <img src="${item.Image}" alt="${item.Name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://s.imgz.io/2026/07/15/DA0D2171-669F-4863-B0AD-A3084C2E881A787a7e4aae484696.png'">
                        <div class="absolute inset-0 bg-black/5 group-hover:bg-transparent transition-colors"></div>
                    </div>
                    <div class="p-4 md:p-5 flex-grow flex flex-col justify-between">
                        <h3 class="font-medium text-gray-800 mb-2 truncate">${item.Name}</h3>
                        <div class="mt-auto flex justify-between items-end">
                            <p class="text-pink-600 font-bold text-lg">${item.Price} ฿</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderReviews() {
            const container = document.getElementById('reviews-container');
            container.innerHTML = '';
            if (storeData.Reviews.length === 0) {
                container.innerHTML = '<div class="col-span-full py-12 text-center text-gray-400 bg-white rounded-3xl border border-dashed border-gray-200">ยังไม่มีข้อมูลรีวิว</div>';
                return;
            }
            storeData.Reviews.forEach(item => {
                const starSvg = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-amber-400" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>`;
                const starsHtml = Array(parseInt(item.Rating) || 5).fill(starSvg).join('');
                
                // ถ้ารีวิวไหนมีภาพ ให้แสดงภาพด้วย
                let imageHtml = '';
                if (item.Image && item.Image.trim() !== '') {
                    imageHtml = `<img src="${item.Image}" alt="เครดิตรีวิว" class="w-full h-48 object-cover rounded-xl mt-4 mb-2 border border-gray-100 shadow-sm" onerror="this.style.display='none'">`;
                }
                
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-3xl shadow-sm border border-pink-100 flex flex-col gap-2 relative overflow-hidden';
                card.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="absolute top-4 right-4 h-12 w-12 text-pink-50 opacity-50" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/></svg>
                    <div class="relative z-10 flex flex-col h-full">
                        <p class="text-gray-600 text-sm italic mb-2 leading-relaxed">"${item.Comment}"</p>
                        ${imageHtml}
                        <div class="mt-auto flex justify-between items-center pt-4 border-t border-gray-50">
                            <span class="font-bold text-gray-800 text-sm">${item.Customer}</span>
                            <div class="flex gap-0.5 bg-gray-50 px-2 py-1 rounded-full">${starsHtml}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- ระบบหลังบ้าน (Admin) ---
        function checkAdminAccess() {
            if (isAdminAuthed) {
                document.getElementById('tab-admin').classList.remove('hidden');
                switchTab('admin');
                renderAdminTable('Platforms');
                return;
            }
            const pwd = prompt('กรุณากรอกรหัสผ่านเพื่อเข้าระบบจัดการ:');
            if (pwd === '0000s') {
                isAdminAuthed = true;
                document.getElementById('tab-admin').classList.remove('hidden');
                switchTab('admin');
                renderAdminTable('Platforms');
            } else if (pwd !== null) {
                alert('รหัสผ่านไม่ถูกต้อง');
            }
        }

        function renderAdminTable(type) {
            const buttons = document.querySelectorAll('.admin-menu');
            buttons.forEach(btn => {
                if (btn.innerText.includes(getThaiName(type))) {
                    btn.className = 'admin-menu bg-pink-500 text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-md shadow-pink-200 transition-all';
                } else {
                    btn.className = 'admin-menu bg-white border border-pink-100 hover:bg-pink-50 text-pink-600 px-5 py-2.5 rounded-full text-sm font-medium transition-all';
                }
            });

            const workspace = document.getElementById('admin-workspace');
            const fields = formSchemas[type];
            let html = `
                <div class="mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-800 mb-5 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        เพิ่ม / แก้ไขข้อมูล: ${getThaiName(type)}
                    </h3>
                    <form id="admin-form" class="space-y-4" onsubmit="event.preventDefault(); submitAdminForm('${type}');">
                        <input type="hidden" id="form-id" value="">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            `;
            
            fields.forEach(field => {
                const inputType = field.key === 'Rating' ? 'number' : 'text';
                const minMax = field.key === 'Rating' ? 'min="1" max="5"' : '';
                const isRequired = field.key === 'Image' && type === 'Reviews' ? '' : 'required'; // รูปรีวิวสามารถเว้นว่างได้
                const colSpan = (field.key === 'Comment' || (field.key === 'Image' && type === 'Reviews')) ? 'md:col-span-2' : '';
                
                html += `
                    <div class="${colSpan}">
                        <label class="block text-sm font-medium text-gray-600 mb-1.5">${field.label}</label>
                        <input type="${inputType}" id="form-${field.key}" ${minMax} class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all text-sm" ${isRequired}>
                    </div>
                `;
            });

            html += `
                        </div>
                        <div class="flex gap-3 pt-4 border-t border-gray-50 mt-6">
                            <button type="submit" class="bg-pink-500 text-white px-6 py-2.5 rounded-full text-sm font-medium hover:bg-pink-600 hover:shadow-md transition-all">บันทึกข้อมูล</button>
                            <button type="button" onclick="resetForm()" class="bg-gray-100 text-gray-600 px-6 py-2.5 rounded-full text-sm font-medium hover:bg-gray-200 transition-all">ยกเลิก / ล้างฟอร์ม</button>
                        </div>
                    </form>
                </div>
                
                <h3 class="text-lg font-bold text-gray-800 mb-4 px-2">รายการข้อมูลปัจจุบัน</h3>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-max">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-sm">
            `;
            
            fields.forEach(field => { html += `<th class="p-4 font-medium border-b border-gray-100">${field.label}</th>`; });
            html += `<th class="p-4 font-medium border-b border-gray-100 text-center w-24">การจัดการ</th></tr></thead><tbody>`;
            
            if (storeData[type].length === 0) {
                html += `<tr><td colspan="${fields.length + 1}" class="text-center py-8 text-gray-400 bg-white">ยังไม่มีข้อมูลในระบบ</td></tr>`;
            } else {
                storeData[type].forEach(item => {
                    html += `<tr class="border-b border-gray-50 hover:bg-pink-50/50 transition-colors bg-white">`;
                    fields.forEach(field => {
                        let val = item[field.key] || '-';
                        if ((field.key === 'Image' || field.key === 'URL') && item[field.key] !== '') {
                            val = `<a href="${val}" target="_blank" class="text-pink-500 hover:text-pink-700 underline text-xs inline-flex items-center gap-1">คลิกดูลิงก์ <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg></a>`;
                        } else if (val.length > 40 && field.key !== 'Image') {
                            val = val.substring(0, 40) + '...';
                        }
                        html += `<td class="p-4 text-sm text-gray-600 align-middle">${val}</td>`;
                    });
                    
                    const itemJson = JSON.stringify(item).replace(/"/g, '&quot;');
                    html += `
                        <td class="p-4 text-center align-middle">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="editAdminForm(${itemJson})" class="p-1.5 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors" title="แก้ไข">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                                </button>
                                <button onclick="deleteData('${type}', '${item.ID}')" class="p-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors" title="ลบ">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </td>
                    </tr>`;
                });
            }
            html += `</tbody></table></div></div>`;
            workspace.innerHTML = html;
        }

        function getThaiName(type) {
            const map = { 'Platforms': 'ช่องทางแพลตฟอร์ม', 'Websites': 'เว็บไซต์', 'Products': 'สินค้า', 'Reviews': 'รีวิว' };
            return map[type] || type;
        }

        function submitAdminForm(type) {
            const fields = formSchemas[type];
            let dataObj = { ID: document.getElementById('form-id').value };
            fields.forEach(field => {
                dataObj[field.key] = document.getElementById(`form-${field.key}`).value;
            });
            saveData(type, dataObj);
        }

        function editAdminForm(item) {
            document.getElementById('form-id').value = item.ID;
            Object.keys(item).forEach(key => {
                const el = document.getElementById(`form-${key}`);
                if (el) el.value = item[key] || '';
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('admin-form').reset();
            document.getElementById('form-id').value = '';
        }

        // --- ระบบหน้าและโหลด ---
        function switchTab(tabId) {
            ['contact', 'products', 'reviews', 'admin'].forEach(id => {
                const view = document.getElementById(`view-${id}`);
                const tab = document.getElementById(`tab-${id}`);
                if (!view || !tab) return;
                
                if (id === tabId) {
                    view.classList.remove('hidden');
                    view.classList.add('animate-fade-in');
                    tab.classList.replace('tab-inactive', 'tab-active');
                } else {
                    view.classList.add('hidden');
                    view.classList.remove('animate-fade-in');
                    tab.classList.replace('tab-active', 'tab-inactive');
                }
            });
        }

        function showLoading(show, text = 'กำลังโหลดข้อมูล...') {
            const loader = document.getElementById('loader');
            if (show) {
                loader.style.display = 'flex';
                loader.querySelector('p').innerText = text;
            } else {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
